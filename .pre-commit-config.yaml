repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.0
    hooks:
      - id: mypy
        files: ^app/
        additional_dependencies:
          - fastapi[standard]
          - pydantic-settings
          - sqlalchemy[mypy]
          - alembic
          - async-lru>=2.3.0
          - slack-sdk
          - aiohttp
          - python-dotenv

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        files: ^(app|tests)/
